server:
  port: ${SERVER_PORT:8880}

spring:
  application:
    name: monetique-eye
  config:
    import: vault://
  cloud:
    vault:
      uri: ${VAULT_URI:http://vault:8200}
      authentication: APPROLE
      app-role:
        role-id: ${VAULT_ROLE_ID}
        secret-id: ${VAULT_SECRET_ID}
        app-role-path: approle
      kv:
        enabled: true
        backend: secret
        default-context: monetique-eye
  codec:
    max-in-memory-size: 10MB
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
  
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQL8Dialect}
  
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: "5"
    repair-on-migrate: true
    validate-on-migrate: false

  
  elasticsearch:
    uris: ${ELASTICSEARCH_URL:http://elasticsearch:9200}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600}

# Integration endpoints
logstash:
  host: ${LOGSTASH_HOST:logstash}
  port: ${LOGSTASH_PORT:5044}

elasticsearch:
  url: ${ELASTICSEARCH_URL:http://elasticsearch:9200}


prometheus:
  url: ${PROMETHEUS_URL:http://prometheus:9090}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

groq:
  api-key: ${GROQ_API_KEY}
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}

monetique:
  security:
    api-key: ${MONETIQUE_SECURITY_API_KEY:default-dev-key}
  git:
    executable: ${GIT_EXECUTABLE:git}
  gitops:
    path: ${MONETIQUE_GITOPS_PATH:./gitops}

monitoring:
  prometheus:
    conf-dir: ${MONITORING_PROMETHEUS_CONF_DIR:/opt/monitoring/prometheus/conf.d}
    reload-url: ${MONITORING_PROMETHEUS_RELOAD_URL:http://prometheus:9090/-/reload}
  blackbox-exporter:
    url: ${MONITORING_BLACKBOX_EXPORTER_URL:http://blackbox-exporter:9115}
  alertmanager:
    base-url: ${MONITORING_ALERTMANAGER_URL:http://alertmanager:9093}