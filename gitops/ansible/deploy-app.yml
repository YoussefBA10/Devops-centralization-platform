---
- name: Deploy Custom Application Flow
  hosts: "{{ target_host }}"
  become: yes

  vars:
    app_dir: "/opt/monetique/apps/{{ appName }}"
    image_name: "{{ appName | lower }}"
    container_name: "{{ appName | lower }}"

  tasks:
    - name: Ensure git is installed (fast)
      package:
        name: git
        state: present

    - name: Ensure app directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Clone repository
      git:
        repo: "{{ repoUrl }}"
        dest: "{{ app_dir }}"
        version: "{{ branch | default('main') }}"
        force: yes

    - name: Build Docker Image
      command: docker build -t {{ image_name }}:latest .
      args:
        chdir: "{{ app_dir }}/{{ srcPath | default('.') }}"

    - name: Stop and remove existing container
      docker_container:
        name: "{{ container_name }}"
        state: absent

    - name: Ensure Docker network exists for environment
      docker_network:
        name: "monetique-{{ envLabel }}"
        state: present

    - name: Run Application Container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}:latest"
        state: started
        restart_policy: always
        ports:
          - "{{ appPort }}:{{ appPort }}"
        networks:
          - name: "monetique-{{ envLabel }}"
        purge_networks: yes
        etc_hosts: "{{ extra_hosts | default('{}') | from_json }}"
        labels:
          app: "{{ appName }}"
          env: "{{ envLabel }}"
          com.monetique.environment: "{{ envLabel }}"
          node: "{{ nodename }}"
        env: "{{ app_env | default('{}') | from_json }}"

    - name: Clean up dangling images
      command: docker image prune -f

