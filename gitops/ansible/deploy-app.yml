---
- name: Deploy Custom Application Flow
  hosts: all
  become: yes
  vars:
    app_dir: "/opt/monetique/apps/{{ appName }}"
    build_dir: "{{ app_dir }}{{ '/' + appType | lower if appType is defined and appType != '' and appType | lower != 'monolith' else '' }}"
    image_name: "{{ appName | lower }}"
    container_name: "{{ appName | lower }}"
    
  tasks:
    - name: Ensure git is installed (fast)
      package:
        name: git
        state: present

    - name: Ensure app directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Clone repository
      git:
        repo: "{{ repoUrl }}"
        dest: "{{ app_dir }}"
        version: "{{ branch | default('main') }}"
        force: yes

    - name: Build Docker Image
      command: docker build -t {{ image_name }}:latest .
      args:
        chdir: "{{ build_dir }}"
      register: build_output

    - name: Stop and remove existing container
      docker_container:
        name: "{{ container_name }}"
        state: absent

    - name: Run Application Container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}:latest"
        state: started
        restart_policy: always
        ports:
          - "{{ appPort }}:{{ appPort }}"
        labels:
          app: "{{ appName }}"
          env: "{{ envLabel }}"
          com.monetique.environment: "{{ envLabel }}"
          node: "{{ nodename }}"
        # In a real scenario, envVars would be passed dynamically and mapped here
        env:
          PORT: "{{ appPort }}"
          NODE_ENV: "production"

    - name: Clean up dangling images
      command: docker image prune -f
