---
- name: Deploy Custom Application Flow
  hosts: "{{ target_host }}"
  become: yes

  vars:
    app_dir: "/opt/monetique/apps/{{ appName }}"
    image_name: "{{ appName | lower }}"
    # Task 2 & Canary logic
    container_name: "{{ (isCanary | default(false) | bool) | ternary(appName ~ '-canary', appName) }}"
    env_map: "{{ envVarsJson | default('{}') | from_json }}"

  tasks:
    - name: Ensure git is installed (fast)
      package:
        name: git
        state: present

    - name: Ensure app directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

#    - name: Fetch GitHub Installation Token
#      uri:
#        url: "http://127.0.0.1:8880/api/github/apps/{{ applicationId }}/token"
#        method: GET
#        return_content: yes
#      register: github_token_response
#      when: githubInstallationId is defined and githubInstallationId != ""
#      delegate_to: localhost
#
#    - name: Set GitHub Token fact
#      set_fact:
#        github_token: "{{ github_token_response.json.token }}"
#      when: githubInstallationId is defined and githubInstallationId != ""
#      no_log: true

    - name: Clone repository
      git:
        repo: "{{ repoUrl }}"
        dest: "{{ app_dir }}"
        version: "{{ branch | default('main') }}"
        force: yes

    - name: Check if Dockerfile exists
      stat:
        path: "{{ app_dir }}/{{ srcPath | default('.') }}/Dockerfile"
      register: dockerfile_stat

    - name: Generate Frontend Dockerfile (Vite/React)
      copy:
        dest: "{{ app_dir }}/{{ srcPath | default('.') }}/Dockerfile"
        content: |
          FROM node:18-alpine as build
          WORKDIR /app
          COPY package*.json ./
          RUN npm install
          COPY . .
          # Task 3: Inject Build-time ARGs and map to ENV for bundlers (Vite/CRA)
          {% for key in env_map.keys() %}
          ARG {{ key }}
          ENV {{ key }}=${{ key }}
          {% endfor %}
          RUN npm run build
          # Normalize build output directory (Vite uses dist, CRA uses build)
          RUN if [ -d "dist" ]; then mv dist output; elif [ -d "build" ]; then mv build output; else mkdir output; fi
          FROM nginx:stable-alpine
          COPY --from=build /app/output /usr/share/nginx/html
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          EXPOSE {{ containerPort | default(80) }}
          CMD ["nginx", "-g", "daemon off;"]
      when: not dockerfile_stat.stat.exists and autoGenerateConfig == 'true' and appType == 'FRONTEND' and appLanguage == 'React'

    - name: Generate Frontend Dockerfile (Generic Node based)
      copy:
        dest: "{{ app_dir }}/{{ srcPath | default('.') }}/Dockerfile"
        content: |
          FROM node:18-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm install
          COPY . .
          # Inject ARGs as ENVs
          {% for key in env_map.keys() %}
          ARG {{ key }}
          ENV {{ key }}=${{ key }}
          {% endfor %}
          EXPOSE {{ containerPort | default(3000) }}
          CMD ["npm", "start"]
      when: not dockerfile_stat.stat.exists and autoGenerateConfig == 'true' and appType == 'FRONTEND' and appLanguage != 'React'

    - name: Generate Backend Dockerfile (Spring Boot)
      copy:
        dest: "{{ app_dir }}/{{ srcPath | default('.') }}/Dockerfile"
        content: |
          FROM eclipse-temurin:21-jdk-alpine as build
          WORKDIR /app
          COPY mvnw .
          COPY .mvn .mvn
          COPY pom.xml .
          COPY src src
          RUN --mount=type=cache,target=/root/.m2 ./mvnw clean package -DskipTests
          FROM eclipse-temurin:21-jre-alpine
          WORKDIR /app
          COPY --from=build /app/target/*.jar app.jar
          EXPOSE {{ containerPort | default(8080) }}
          ENTRYPOINT ["java","-jar","/app/app.jar"]
      when: not dockerfile_stat.stat.exists and autoGenerateConfig == 'true' and appType == 'BACKEND' and appLanguage == 'Java Spring Boot'

    - name: Generate Backend Dockerfile (Generic Node based)
      copy:
        dest: "{{ app_dir }}/{{ srcPath | default('.') }}/Dockerfile"
        content: |
          FROM node:18-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm install
          COPY . .
          # Inject ARGs as ENVs
          {% for key in env_map.keys() %}
          ARG {{ key }}
          ENV {{ key }}=${{ key }}
          {% endfor %}
          EXPOSE {{ containerPort | default(3000) }}
          CMD ["npm", "start"]
      when: not dockerfile_stat.stat.exists and autoGenerateConfig == 'true' and appType == 'BACKEND' and (appLanguage == 'Node.js' or appLanguage == 'Express' or appLanguage == 'NestJS')

    - name: Check if nginx.conf exists
      stat:
        path: "{{ app_dir }}/{{ srcPath | default('.') }}/nginx.conf"
      register: nginx_stat

    - name: Generate nginx.conf
      copy:
        dest: "{{ app_dir }}/{{ srcPath | default('.') }}/nginx.conf"
        content: |
          server {
            listen {{ containerPort | default(80) }};
            server_name localhost;
            root /usr/share/nginx/html;
            index index.html index.htm;
            location / {
              try_files $uri $uri/ /index.html;
            }
          }
      when: not nginx_stat.stat.exists and autoGenerateConfig == 'true' and appType == 'FRONTEND' and appLanguage == 'React'

    - name: Patch existing nginx.conf to use requested containerPort
      shell: "sed -i -E 's/listen\\s+[0-9]+/listen {{ containerPort | default(80) }}/g' {{ app_dir }}/{{ srcPath | default('.') }}/nginx.conf"
      when: nginx_stat.stat.exists and appType == 'FRONTEND'

    - name: Cleanup old container if renamed (Task 2)
      docker_container:
        name: "{{ oldAppName }}"
        state: absent
      when: oldAppName is defined and oldAppName != ""

    - name: Cleanup stable container if promoting from canary
      docker_container:
        name: "{{ appName }}"
        state: absent
      when: not (isCanary | default(false) | bool)

    - name: Cleanup canary container if promoting
      docker_container:
        name: "{{ appName }}-canary"
        state: absent
      when: not (isCanary | default(false) | bool)

    - name: Identify conflicting container on target port
      shell: |
        docker ps --filter "publish={{ appPort }}" --format "{{ '{{.Names}}' }}"
      register: conflicting_container_query
      changed_when: false

    - name: Validate port conflict safety
      set_fact:
        conflicting_container_name: "{{ conflicting_container_query.stdout | trim }}"

    - name: Handle port conflict
      block:
        - name: Allow cleanup for same application family
          shell: |
            CONTAINER_ID=$(docker ps -q --filter "publish={{ appPort }}")
            echo "Removing existing application container $CONTAINER_ID ({{ conflicting_container_name }}) to allow update."
            docker stop $CONTAINER_ID
            docker rm $CONTAINER_ID
          when: 
            - conflicting_container_name != ""
            - conflicting_container_name == appName or conflicting_container_name == appName + "-canary" or conflicting_container_name == oldAppName

        - name: Block deployment for unrelated conflicts
          fail:
            msg: "Port {{ appPort }} is already occupied by an unrelated container: '{{ conflicting_container_name }}'. Please change the port or stop the conflicting service manually."
          when: 
            - conflicting_container_name != ""
            - conflicting_container_name != appName
            - conflicting_container_name != appName + "-canary"
            - conflicting_container_name != oldAppName
      when: conflicting_container_name != ""

    - name: Build Docker Image
      command: docker build -t {{ image_name }}:latest {{ dockerBuildArgs | default('') }} .
      args:
        chdir: "{{ app_dir }}/{{ srcPath | default('.') }}"

    - name: Stop and remove existing container
      docker_container:
        name: "{{ container_name }}"
        state: absent

    - name: Run Application Container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}:latest"
        state: started
        restart_policy: always
        ports:
          - "{{ appPort }}:{{ containerPort | default(appPort) }}"
        labels:
          app: "{{ appName }}"
          env: "{{ envLabel }}"
          com.monetique.environment: "{{ envLabel }}"
          node: "{{ nodename }}"
          is_canary: "{{ isCanary | default(false) | bool | string }}"
        env: "{{ env_map | combine({'NODE_ENV': 'production'}) }}"

    - name: Clean up dangling images
      command: docker image prune -f

