---
- name: Deploy Observability Tools to RedHat Agent Node
  hosts: "{{ target_host | default('all') }}"
  become: yes
  any_errors_fatal: yes

  vars:
    filebeat_version: "8.11.1"
    central_logstash_ip: "{{ hostvars['localhost']['ansible_default_ipv4']['address'] | default('192.168.126.130') }}"
    env_label: "{{ environment_label | default('production') }}"

  pre_tasks:
    - name: Pre-flight Check - Verify connectivity
      ping:
    
    - name: Ensure EPEL repository is present
      package:
        name: epel-release
        state: present
      ignore_errors: yes

    - name: Ensure common tools are installed
      package:
        name:
          - git
          - curl
          - wget
          - htop
        state: present

    # -----------------------------
    # Check if Docker exists
    # -----------------------------
    - name: Check if Docker is installed
      command: docker --version
      register: docker_check
      ignore_errors: yes
      changed_when: false

    # -----------------------------
    # Install Docker (RedHat/CentOS)
    # -----------------------------
    - name: Add Docker repo (RedHat)
      get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo
      when: docker_check.failed

    - name: Install Docker and dependencies
      dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      when: docker_check.failed

    - name: Start Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    # -----------------------------
    # Ensure containers are absent (idempotent)
    # -----------------------------
    - name: Remove old containers if exist
      shell: |
        docker rm -f cadvisor node-exporter filebeat || true
      args:
        executable: /bin/bash
      changed_when: false

    # -----------------------------
    # Run cAdvisor
    # -----------------------------
    - name: Run cAdvisor
      shell: |
        docker run -d --name cadvisor \
        --restart=always \
        -p 8081:8080 \
        -v /:/rootfs:ro \
        -v /var/run:/var/run:ro \
        -v /sys:/sys:ro \
        -v /var/lib/docker/:/var/lib/docker:ro \
        -v /dev/disk/:/dev/disk:ro \
        gcr.io/cadvisor/cadvisor:latest
      args:
        executable: /bin/bash

    # -----------------------------
    # Run Node Exporter
    # -----------------------------
    - name: Run Node Exporter
      shell: |
        docker run -d --name node-exporter \
        --restart=always \
        -p 9100:9100 \
        -v /:/host:ro,rslave \
        prom/node-exporter:latest \
        --path.rootfs=/host
      args:
        executable: /bin/bash

    # -----------------------------
    # Run Filebeat
    # -----------------------------
    - name: Run Filebeat
      shell: |
        docker run -d --name filebeat \
        --restart=always \
        --user root \
        -v /var/lib/docker/containers:/var/lib/docker/containers:ro \
        -v /var/run/docker.sock:/var/run/docker.sock:ro \
        docker.elastic.co/beats/filebeat:{{ filebeat_version }} \
        filebeat -e \
        -E "output.elasticsearch.enabled=false" \
        -E "output.logstash.hosts=['{{ central_logstash_ip }}:5045']" \
        -E "filebeat.inputs=[{type: container, paths: ['/var/lib/docker/containers/*/*.log']}]"
      args:
        executable: /bin/bash
