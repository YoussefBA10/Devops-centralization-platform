---
- name: Undeploy Observability Tools from Agent Node
  hosts: "{{ target_host | default('node-1') }}"
  become: yes

  tasks:
    - name: Remove observability containers
      shell: |
        docker rm -f cadvisor node-exporter filebeat || true
      changed_when: false

    - name: Remove observability docker images
      shell: |
        docker rmi -f gcr.io/cadvisor/cadvisor:latest prom/node-exporter:latest docker.elastic.co/beats/filebeat:8.11.1 || true
      changed_when: false

    - name: Remove backend SSH key
      authorized_key:
        user: "{{ ssh_user | default(ansible_user) }}"
        state: absent
        key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
      ignore_errors: true
