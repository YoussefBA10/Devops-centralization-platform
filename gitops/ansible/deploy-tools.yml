---
- name: Deploy Observability Tools to Agent Node
  hosts: "{{ target_host | default('all') }}"
  any_errors_fatal: yes

  vars:
    filebeat_version: "8.11.1"
    central_logstash_ip: "{{ hostvars['localhost']['ansible_default_ipv4']['address'] | default('192.168.126.130') }}"
    env_label: "{{ environment_label | default('production') }}"

  pre_tasks:
    - name: Pre-flight Check - Verify connectivity
      ping:

  tasks:
    # -----------------------------
    # -----------------------------
    # Check & Run Containers
    # -----------------------------
    - name: Check if cAdvisor is already running
      wait_for:
        port: 8081
        timeout: 1
      register: cadvisor_port_check
      ignore_errors: yes

    - name: Run cAdvisor
      shell: |
        docker rm -f cadvisor || true
        docker run -d --name cadvisor \
        --restart=always \
        -p 8081:8080 \
        -v /:/rootfs:ro,z \
        -v /var/run:/var/run:ro,z \
        -v /sys:/sys:ro,z \
        -v /var/lib/docker/:/var/lib/docker:ro,z \
        -v /dev/disk/:/dev/disk:ro,z \
        -v /data:/data:ro,z \
        gcr.io/cadvisor/cadvisor:latest
      args:
        executable: /bin/bash
      when: cadvisor_port_check.failed

    - name: Check if Node Exporter is already running
      wait_for:
        port: 9100
        timeout: 1
      register: node_exporter_port_check
      ignore_errors: yes

    - name: Run Node Exporter
      shell: |
        docker rm -f node-exporter || true
        docker run -d --name node-exporter \
        --restart=always \
        -p 9100:9100 \
        -v /:/host:ro,rslave,z \
        -v /data:/data:ro,z \
        prom/node-exporter:latest \
        --path.rootfs=/host
      args:
        executable: /bin/bash
      when: node_exporter_port_check.failed

    - name: Check if Filebeat is already running
      wait_for:
        port: 5066
        timeout: 1
      register: filebeat_port_check
      ignore_errors: yes

    - name: Run Filebeat
      shell: |
        docker rm -f filebeat || true
        docker run -d --name filebeat \
        --restart=always \
        --user root \
        -p 5066:5066 \
        -v /var/lib/docker/containers:/var/lib/docker/containers:ro,z \
        -v /var/run/docker.sock:/var/run/docker.sock:ro,z \
        docker.elastic.co/beats/filebeat:{{ filebeat_version }} \
        filebeat -e \
        -E "http.enabled=true" \
        -E "http.host=0.0.0.0" \
        -E "output.elasticsearch.enabled=false" \
        -E "output.logstash.hosts=['{{ central_logstash_ip }}:5045']" \
        -E "filebeat.inputs=[{type: container, paths: ['/var/lib/docker/containers/*/*.log']}]"
      args:
        executable: /bin/bash
      when: filebeat_port_check.failed