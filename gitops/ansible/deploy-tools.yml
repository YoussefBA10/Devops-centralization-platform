---
- name: Deploy Observability Tools to Agent Node
  hosts: "{{ target_host | default('all') }}"
  any_errors_fatal: yes

  vars:
    filebeat_version: "8.11.1"
    central_logstash_ip: "{{ hostvars['localhost']['ansible_default_ipv4']['address'] | default('192.168.126.130') }}"
    env_label: "{{ environment_label | default('production') }}"
    cadvisor_image: "gcr.io/cadvisor/cadvisor:latest"
    node_exporter_image: "prom/node-exporter:latest"
    filebeat_image: "docker.elastic.co/beats/filebeat:{{ filebeat_version }}"
    
    # Default Ports
    default_cadvisor_port: "8181"
    default_node_exporter_port: "9100"
    default_filebeat_port: "5066"

  pre_tasks:
    - name: Pre-flight Check - Verify connectivity
      ping:

    - name: Find Docker binary on central node
      shell: |
        for p in "$(which docker 2>/dev/null)" "/usr/bin/docker" "/usr/local/bin/docker" "/snap/bin/docker" "/bin/docker"; do
          if [ -x "$p" ]; then
            echo "$p"
            exit 0
          fi
        done
        SEARCH=$(find /usr/bin /usr/local/bin /snap/bin /bin -name docker -type f -executable 2>/dev/null | head -n 1)
        if [ -n "$SEARCH" ]; then
          echo "$SEARCH"
          exit 0
        fi
        echo "docker"
      delegate_to: localhost
      become: no
      run_once: true
      register: central_docker_bin
      changed_when: false

    - name: Set Central Docker Path Fact
      set_fact:
        final_central_docker: "{{ central_docker_bin.stdout | trim | default('docker') }}"

    - name: Debug Central Docker Path
      debug:
        msg: "Using Docker binary at: {{ final_central_docker }}"
      run_once: true

  tasks:
    # ===================================================================
    #  1. cAdvisor
    # ===================================================================
    - name: Detect existing cAdvisor configuration
      shell: |
        RUNNING=$(docker inspect -f '{% raw %}{{.State.Running}}{% endraw %}' cadvisor 2>/dev/null || echo "false")
        PORT=$(docker inspect -f '{% raw %}{{range $p, $conf := .NetworkSettings.Ports}}{{(index $conf 0).HostPort}}{{end}}{% endraw %}' cadvisor 2>/dev/null || echo "")
        ENV=$(docker inspect -f '{% raw %}{{index .Config.Labels "com.monetique.environment"}}{% endraw %}' cadvisor 2>/dev/null || echo "unknown")
        echo "$RUNNING|$PORT|$ENV"
      register: cadvisor_detect
      changed_when: false
      ignore_errors: yes

    - name: Set cAdvisor Facts
      set_fact:
        cadvisor_running: "{{ cadvisor_detect.stdout.split('|')[0] | default('false') }}"
        final_cadvisor_port: "{{ cadvisor_detect.stdout.split('|')[1] | default(default_cadvisor_port) if cadvisor_detect.stdout.split('|')[1] != '' else default_cadvisor_port }}"
        cadvisor_env: "{{ cadvisor_detect.stdout.split('|')[2] | default('unknown') }}"

    - name: Show cAdvisor Status Message
      debug:
        msg: >-
          {% if cadvisor_running == "true" %}
            {% if cadvisor_env == env_label %}
              cAdvisor is already deployed in this env ({{ env_label }}) on port {{ final_cadvisor_port }}
            {% else %}
              cAdvisor is already deployed in a different env: {{ cadvisor_env }} on port {{ final_cadvisor_port }}
            {% endif %}
          {% else %}
            cAdvisor is not deployed. Proceeding with deployment...
          {% endif %}

    - name: Handle cAdvisor Image Transfer
      block:
        - name: Check if cAdvisor image exists on remote
          shell: docker image inspect {{ cadvisor_image }} > /dev/null 2>&1 && echo "exists" || echo "missing"
          register: cadvisor_image_check
          changed_when: false

        - name: Transfer cAdvisor image from central node
          block:
            - name: Check if image exists on central node
              shell: "{{ final_central_docker }} image inspect {{ cadvisor_image }} > /dev/null 2>&1 && echo 'exists' || echo 'missing'"
              delegate_to: localhost
              become: no
              run_once: true
              register: cadvisor_central_check

            - name: Ensure cAdvisor image exists on central node (Pull if missing)
              shell: "{{ final_central_docker }} pull {{ cadvisor_image }}"
              delegate_to: localhost
              become: no
              run_once: true
              when: cadvisor_central_check.stdout == 'missing'
              ignore_errors: yes

            - name: Save cAdvisor image to archive
              shell: "{{ final_central_docker }} save {{ cadvisor_image }} -o ~/cadvisor.tar"
              delegate_to: localhost
              become: no
              run_once: true

            - name: Copy cAdvisor image to remote node
              copy:
                src: ~/cadvisor.tar
                dest: ~/cadvisor.tar

            - name: Load cAdvisor image on remote node
              shell: docker load -i ~/cadvisor.tar

            - name: Clean up cAdvisor archives
              block:
                - file: { path: ~/cadvisor.tar, state: absent }
                - file: { path: ~/cadvisor.tar, state: absent }
                  delegate_to: localhost
                  become: no
                  run_once: true
          when: cadvisor_image_check.stdout == "missing"
      when: cadvisor_running != "true"

    - name: Run cAdvisor (Only if not already running)
      shell: |
        docker run -d --name cadvisor \
        --restart=always \
        --label com.monetique.environment={{ env_label }} \
        -p {{ final_cadvisor_port }}:8080 \
        -v /:/rootfs:ro,z \
        -v /var/run:/var/run:ro,z \
        -v /sys:/sys:ro,z \
        -v /var/lib/docker/:/var/lib/docker:ro,z \
        -v /dev/disk/:/dev/disk:ro,z \
        -v /data:/data:ro,z \
        {{ cadvisor_image }}
      args:
        executable: /bin/bash
      when: cadvisor_running != "true"

    # ===================================================================
    #  2. Node Exporter
    # ===================================================================
    - name: Detect existing Node Exporter configuration
      shell: |
        RUNNING=$(docker inspect -f '{% raw %}{{.State.Running}}{% endraw %}' node-exporter 2>/dev/null || echo "false")
        PORT=$(docker inspect -f '{% raw %}{{range $p, $conf := .NetworkSettings.Ports}}{{(index $conf 0).HostPort}}{{end}}{% endraw %}' node-exporter 2>/dev/null || echo "")
        ENV=$(docker inspect -f '{% raw %}{{index .Config.Labels "com.monetique.environment"}}{% endraw %}' node-exporter 2>/dev/null || echo "unknown")
        echo "$RUNNING|$PORT|$ENV"
      register: node_exporter_detect
      changed_when: false
      ignore_errors: yes

    - name: Set Node Exporter Facts
      set_fact:
        node_exporter_running: "{{ node_exporter_detect.stdout.split('|')[0] | default('false') }}"
        final_node_exporter_port: "{{ node_exporter_detect.stdout.split('|')[1] | default(default_node_exporter_port) if node_exporter_detect.stdout.split('|')[1] != '' else default_node_exporter_port }}"
        node_exporter_env: "{{ node_exporter_detect.stdout.split('|')[2] | default('unknown') }}"

    - name: Show Node Exporter Status Message
      debug:
        msg: >-
          {% if node_exporter_running == "true" %}
            {% if node_exporter_env == env_label %}
              Node Exporter is already deployed in this env ({{ env_label }}) on port {{ final_node_exporter_port }}
            {% else %}
              Node Exporter is already deployed in a different env: {{ node_exporter_env }} on port {{ final_node_exporter_port }}
            {% endif %}
          {% else %}
            Node Exporter is not deployed. Proceeding with deployment...
          {% endif %}

    - name: Handle Node Exporter Image Transfer
      block:
        - name: Check if Node Exporter image exists on remote
          shell: docker image inspect {{ node_exporter_image }} > /dev/null 2>&1 && echo "exists" || echo "missing"
          register: node_exporter_image_check
          changed_when: false

        - name: Transfer Node Exporter image from central node
          block:
            - name: Check if image exists on central node
              shell: "{{ final_central_docker }} image inspect {{ node_exporter_image }} > /dev/null 2>&1 && echo 'exists' || echo 'missing'"
              delegate_to: localhost
              become: no
              run_once: true
              register: node_exporter_central_check

            - name: Ensure Node Exporter image exists on central node (Pull if missing)
              shell: "{{ final_central_docker }} pull {{ node_exporter_image }}"
              delegate_to: localhost
              become: no
              run_once: true
              when: node_exporter_central_check.stdout == 'missing'
              ignore_errors: yes

            - name: Save Node Exporter image to archive
              shell: "{{ final_central_docker }} save {{ node_exporter_image }} -o ~/node-exporter.tar"
              delegate_to: localhost
              become: no
              run_once: true

            - name: Copy Node Exporter image to remote node
              copy:
                src: ~/node-exporter.tar
                dest: ~/node-exporter.tar

            - name: Load Node Exporter image on remote node
              shell: docker load -i ~/node-exporter.tar

            - name: Clean up Node Exporter archives
              block:
                - file: { path: ~/node-exporter.tar, state: absent }
                - file: { path: ~/node-exporter.tar, state: absent }
                  delegate_to: localhost
                  become: no
                  run_once: true
          when: node_exporter_image_check.stdout == "missing"
      when: node_exporter_running != "true"

    - name: Run Node Exporter (Only if not already running)
      shell: |
        docker run -d --name node-exporter \
        --restart=always \
        --label com.monetique.environment={{ env_label }} \
        -p {{ final_node_exporter_port }}:9100 \
        -v /:/host:ro,rslave,z \
        -v /data:/data:ro,z \
        {{ node_exporter_image }} \
        --path.rootfs=/host
      args:
        executable: /bin/bash
      when: node_exporter_running != "true"

    # ===================================================================
    #  3. Filebeat
    # ===================================================================
    - name: Detect existing Filebeat configuration
      shell: |
        RUNNING=$(docker inspect -f '{% raw %}{{.State.Running}}{% endraw %}' filebeat 2>/dev/null || echo "false")
        PORT=$(docker inspect -f '{% raw %}{{range $p, $conf := .NetworkSettings.Ports}}{{(index $conf 0).HostPort}}{{end}}{% endraw %}' filebeat 2>/dev/null || echo "")
        ENV=$(docker inspect -f '{% raw %}{{index .Config.Labels "com.monetique.environment"}}{% endraw %}' filebeat 2>/dev/null || echo "unknown")
        echo "$RUNNING|$PORT|$ENV"
      register: filebeat_detect
      changed_when: false
      ignore_errors: yes

    - name: Set Filebeat Facts
      set_fact:
        filebeat_running: "{{ filebeat_detect.stdout.split('|')[0] | default('false') }}"
        final_filebeat_port: "{{ filebeat_detect.stdout.split('|')[1] | default(default_filebeat_port) if filebeat_detect.stdout.split('|')[1] != '' else default_filebeat_port }}"
        filebeat_env: "{{ filebeat_detect.stdout.split('|')[2] | default('unknown') }}"

    - name: Show Filebeat Status Message
      debug:
        msg: >-
          {% if filebeat_running == "true" %}
            {% if filebeat_env == env_label %}
              Filebeat is already deployed in this env ({{ env_label }}) on port {{ final_filebeat_port }}
            {% else %}
              Filebeat is already deployed in a different env: {{ filebeat_env }} on port {{ final_filebeat_port }}
            {% endif %}
          {% else %}
            Filebeat is not deployed. Proceeding with deployment...
          {% endif %}

    - name: Handle Filebeat Image Transfer
      block:
        - name: Check if Filebeat image exists on remote
          shell: docker image inspect {{ filebeat_image }} > /dev/null 2>&1 && echo "exists" || echo "missing"
          register: filebeat_image_check
          changed_when: false

        - name: Transfer Filebeat image from central node
          block:
            - name: Check if image exists on central node
              shell: "{{ final_central_docker }} image inspect {{ filebeat_image }} > /dev/null 2>&1 && echo 'exists' || echo 'missing'"
              delegate_to: localhost
              become: no
              run_once: true
              register: filebeat_central_check

            - name: Ensure Filebeat image exists on central node (Pull if missing)
              shell: "{{ final_central_docker }} pull {{ filebeat_image }}"
              delegate_to: localhost
              become: no
              run_once: true
              when: filebeat_central_check.stdout == 'missing'
              ignore_errors: yes

            - name: Save Filebeat image to archive
              shell: "{{ final_central_docker }} save {{ filebeat_image }} -o ~/filebeat.tar"
              delegate_to: localhost
              become: no
              run_once: true

            - name: Copy Filebeat image to remote node
              copy:
                src: ~/filebeat.tar
                dest: ~/filebeat.tar

            - name: Load Filebeat image on remote node
              shell: docker load -i ~/filebeat.tar

            - name: Clean up Filebeat archives
              block:
                - file: { path: ~/filebeat.tar, state: absent }
                - file: { path: ~/filebeat.tar, state: absent }
                  delegate_to: localhost
                  become: no
                  run_once: true
          when: filebeat_image_check.stdout == "missing"
      when: filebeat_running != "true"

    - name: Run Filebeat (Only if not already running)
      shell: |
        docker rm -f filebeat || true
        docker run -d --name filebeat \
        --restart=always \
        --user root \
        --label com.monetique.environment={{ env_label }} \
        -p {{ final_filebeat_port }}:5066 \
        -v /var/lib/docker/containers:/var/lib/docker/containers:ro,z \
        -v /var/run/docker.sock:/var/run/docker.sock:ro,z \
        {{ filebeat_image }} \
        filebeat -e \
        -E "http.enabled=true" \
        -E "http.host=0.0.0.0" \
        -E "output.elasticsearch.enabled=false" \
        -E "output.logstash.hosts=['{{ central_logstash_ip }}:5045']" \
        -E "filebeat.inputs=[{type: container, paths: ['/var/lib/docker/containers/*/*.log']}]" \
        -E "fields.environment={{ env_label }}" \
        -E "fields.node={{ nodename }}" \
        -E "fields_under_root=true"
      args:
        executable: /bin/bash
      when: filebeat_running != "true"
      ignore_errors: yes