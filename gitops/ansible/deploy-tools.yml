---
- name: Deploy Observability Tools to Agent Node
  hosts: "{{ target_host | default('all') }}"
  become: yes
  any_errors_fatal: yes

  vars:
    filebeat_version: "8.11.1"
    central_logstash_ip: "{{ hostvars['localhost']['ansible_default_ipv4']['address'] | default('192.168.126.130') }}"
    env_label: "{{ environment_label | default('production') }}"

  pre_tasks:
    - name: Pre-flight Check - Verify connectivity
      ping:
    
    - name: Ensure common tools are installed
      package:
        name:
          - git
          - curl
          - wget
          - htop
          - net-tools
        state: present

    # -----------------------------
    # Cross-Platform Docker Check
    # -----------------------------
    - name: Check if Docker is installed
      command: docker --version
      register: docker_check
      ignore_errors: yes
      changed_when: false

    # -----------------------------
    # Install Docker (Distro Aware)
    # -----------------------------
    - name: Install Docker dependencies (Debian/Ubuntu)
      apt:
        name: [apt-transport-https, ca-certificates, gnupg, lsb-release]
        update_cache: yes
      when: 
        - docker_check.failed
        - ansible_os_family == "Debian"

    - name: Add Docker Repo (RedHat/CentOS)
      get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo
      when:
        - docker_check.failed
        - ansible_os_family == "RedHat"

    - name: Install Docker (Universal)
      package:
        name: "{{ (ansible_os_family == 'Debian') | ternary('docker.io', 'docker-ce') }}"
        state: present
      when: docker_check.failed

    - name: Start Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    # -----------------------------
    # Firewall Management (RedHat)
    # -----------------------------
    - name: Open Monitoring Ports in FirewallD (RedHat)
      firewalld:
        port: "{{ item }}"
        permanent: yes
        state: enabled
        immediate: yes
      loop:
        - 8081/tcp # cAdvisor
        - 9100/tcp # Node Exporter
      when: ansible_os_family == "RedHat"
      ignore_errors: yes

    # -----------------------------
    # Cleanup & Run Containers
    # -----------------------------
    - name: Remove old containers if exist
      shell: "docker rm -f cadvisor node-exporter filebeat || true"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Run cAdvisor
      shell: |
        docker run -d --name cadvisor \
        --restart=always \
        -p 8081:8080 \
        -v /:/rootfs:ro,z \
        -v /var/run:/var/run:ro,z \
        -v /sys:/sys:ro,z \
        -v /var/lib/docker/:/var/lib/docker:ro,z \
        -v /dev/disk/:/dev/disk:ro,z \
        gcr.io/cadvisor/cadvisor:latest
      args:
        executable: /bin/bash

    - name: Run Node Exporter
      shell: |
        docker run -d --name node-exporter \
        --restart=always \
        -p 9100:9100 \
        -v /:/host:ro,rslave,z \
        prom/node-exporter:latest \
        --path.rootfs=/host
      args:
        executable: /bin/bash

    - name: Run Filebeat
      shell: |
        docker run -d --name filebeat \
        --restart=always \
        --user root \
        -v /var/lib/docker/containers:/var/lib/docker/containers:ro,z \
        -v /var/run/docker.sock:/var/run/docker.sock:ro,z \
        docker.elastic.co/beats/filebeat:{{ filebeat_version }} \
        filebeat -e \
        -E "output.elasticsearch.enabled=false" \
        -E "output.logstash.hosts=['{{ central_logstash_ip }}:5045']" \
        -E "filebeat.inputs=[{type: container, paths: ['/var/lib/docker/containers/*/*.log']}]"
      args:
        executable: /bin/bash