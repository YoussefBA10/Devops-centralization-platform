filebeat.inputs:
- type: container
  id: docker-container-logs
  enabled: true
  paths:
    - /var/lib/docker/containers/*/*.log

processors:
  - add_docker_metadata: ~
  - add_host_metadata: ~
  - add_fields:
      target: ''
      fields:
        environment: "{{ env_label }}"
        node: "{{ nodename }}"

output.logstash:
  hosts: ["{{ central_logstash_ip }}:5045"]

logging.level: info

http.enabled: true
http.host: 0.0.0.0
http.port: 5066
