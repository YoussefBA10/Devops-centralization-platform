global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"
  - "prediction_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          node: "vmpipe"
          app: "Monetique-eye"

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          node: "vmpipe"
          app: "Monetique-eye"
      - targets: ["192.168.126.131:9100"]
        labels:
          node: "node-1"
          app: "infra-test-app"
      - targets: ["192.168.126.132:9100"]
        labels:
          node: "node-2"
          app: "infra-test-app"

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          node: "vmpipe"
          app: "Monetique-eye"
      - targets: ["192.168.126.131:8082"]
        labels:
          node: "node-1"
          app: "infra-test-app"
      - targets: ["192.168.126.132:8082"]
        labels:
          node: "node-2"
          app: "infra-test-app"

  - job_name: "blackbox-exporter"
    static_configs:
      - targets: ["blackbox-exporter:9115"]
        labels:
          node: "vmpipe"
          app: "Monetique-eye"

  - job_name: "backend"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["backend:9001"]
        labels:
          node: "vmpipe"
          app: "Monetique-eye"

  - job_name: "js-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["192.168.126.131:3000"]
        labels:
          node: "node-1"
          app: "infra-test-app"

