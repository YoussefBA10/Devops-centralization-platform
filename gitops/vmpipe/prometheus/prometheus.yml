global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alerting configuration (optional but recommended)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Rule files
rule_files:
  - "alert_rules.yml"
  - "prediction_rules.yml"
  - "rules/*.yml"

# Scrape configurations
scrape_configs:

  # 1. Scrape the Monetique-Eye Backend itself (self-monitoring)
  - job_name: 'monetique-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8880']
        labels:
          environment: "central-node"
          nodename: "central-node"
          app_id: "1"

  # 2. Central Node (central-node) - Self monitoring
  - job_name: 'central-node'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          environment: "central-node"
          role: "central-node"
          nodename: "central-node"

  # 3. Dynamic scraping of all Agent Nodes (Environment-aware)
  # Prometheus will automatically discover nodes based on labels added by Ansible
  - job_name: 'agent-nodes'
    metrics_path: '/metrics'
    honor_labels: true
    kubernetes_sd_configs: []   # Not using K8s - we use static + relabeling
    static_configs: []
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # 4. Node Exporter (Host metrics) - scraped from all agents
  - job_name: 'node-exporter'
    metrics_path: '/metrics'
    file_sd_configs:
      - files:
          - '/etc/prometheus/file_sd/*.yml'
          - '/etc/prometheus/file_sd/*.json'
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [job]
        regex: 'node-exporter'
        action: keep
      - source_labels: [instance]
        regex: '([^:]+):.*'
        target_label: instance
        replacement: '${1}'

  # 5. cAdvisor (Container metrics) - scraped from all agents
  - job_name: 'cadvisor'
    metrics_path: '/metrics'
    file_sd_configs:
      - files:
          - '/etc/prometheus/file_sd/*.yml'
          - '/etc/prometheus/file_sd/*.json'
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [job]
        regex: 'cadvisor'
        action: keep
      - source_labels: [instance]
        regex: '([^:]+):.*'
        target_label: instance
        replacement: '${1}'

  # 6. Filebeat (Log agent metrics)
  - job_name: 'filebeat'
    metrics_path: '/metrics'
    file_sd_configs:
      - files:
          - '/etc/prometheus/file_sd/*.yml'
          - '/etc/prometheus/file_sd/*.json'
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [job]
        regex: 'filebeat'
        action: keep

  # 7. Elasticsearch (DB Metrics)
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch-exporter:9114']
        labels:
          environment: "central-node"
          nodename: "central-node"

  # 8. Alertmanager (Self monitoring)
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          environment: "central-node"
          nodename: "central-node"

  # 9. Grafana (Self monitoring)
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          environment: "central-node"
          nodename: "central-node"

  # 11. Blackbox Exporter (Dynamic probing of nodes + custom targets)
  - job_name: 'blackbox'
    metrics_path: '/probe'
    params:
      module: [http_2xx]
    file_sd_configs:
      - files:
          - '/etc/prometheus/file_sd/*.yml'
          - '/etc/prometheus/file_sd/*.json'
        refresh_interval: 15s
    relabel_configs:
      # 1. Keep only node-exporter and custom blackbox targets
      - source_labels: [job]
        regex: 'node-exporter|blackbox'
        action: keep

      # 2. Map target URL for node-exporter targets
      - source_labels: [job, __address__]
        regex: 'node-exporter;(.*)'
        target_label: __param_target
        replacement: 'http://${1}/'

      # 3. Map target URL for custom blackbox targets
      - source_labels: [job, __address__]
        regex: 'blackbox;(.*)'
        target_label: __param_target
        replacement: '${1}'

      # 4. Save target URL as the instance label
      - source_labels: [__param_target]
        target_label: instance

      # 5. Point Prometheus to the actual blackbox-exporter service
      - target_label: __address__
        replacement: blackbox-exporter:9115

      # 6. Ensure probe_module is set for frontend queries
      - target_label: probe_module
        replacement: http_2xx

      # 7. Standardize job name
      - target_label: job
        replacement: blackbox

  # 12. Network Monitor (Dynamic discovery via Monetique-Eye)
  - job_name: 'network-monitor-dynamic'
    metrics_path: '/probe'
    file_sd_configs:
      - files:
          - '/etc/prometheus/conf.d/*.yml'
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [probe_module]
        target_label: __param_module
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # 13. Process Exporter (Process resource metrics)
  - job_name: 'process-exporter'
    metrics_path: '/metrics'
    file_sd_configs:
      - files:
          - '/etc/prometheus/file_sd/*.yml'
          - '/etc/prometheus/file_sd/*.json'
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [job]
        regex: 'process-exporter'
        action: keep
      - source_labels: [instance]
        regex: '([^:]+):.*'
        target_label: instance
        replacement: '${1}'