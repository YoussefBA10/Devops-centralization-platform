global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alerting configuration (optional but recommended)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Scrape configurations
scrape_configs:

  # 1. Scrape the Monetique-Eye Backend itself (self-monitoring)
  - job_name: 'monetique-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:9001']
        labels:
          environment: "central-node"
          nodename: "central-node"

  # 2. Central Node (central-node) - Self monitoring
  - job_name: 'central-node'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          environment: "vmpipe"
          role: "central-node"
          nodename: "vmpipe"

  # 3. Dynamic scraping of all Agent Nodes (Environment-aware)
  # Prometheus will automatically discover nodes based on labels added by Ansible
  - job_name: 'agent-nodes'
    metrics_path: '/metrics'
    honor_labels: true
    kubernetes_sd_configs: []   # Not using K8s - we use static + relabeling
    static_configs: []
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # 4. Node Exporter (Host metrics) - scraped from all agents
  - job_name: 'node-exporter'
    metrics_path: '/metrics'
    file_sd_configs:
      - files:
          - '/etc/prometheus/file_sd/*.yml'
          - '/etc/prometheus/file_sd/*.json'
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [job]
        regex: 'node-exporter'
        action: keep

  # 5. cAdvisor (Container metrics) - scraped from all agents
  - job_name: 'cadvisor'
    metrics_path: '/metrics'
    file_sd_configs:
      - files:
          - '/etc/prometheus/file_sd/*.yml'
          - '/etc/prometheus/file_sd/*.json'
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [job]
        regex: 'cadvisor'
        action: keep

  # 6. Filebeat (Log agent metrics)
  - job_name: 'filebeat'
    metrics_path: '/metrics'
    file_sd_configs:
      - files:
          - '/etc/prometheus/file_sd/*.yml'
          - '/etc/prometheus/file_sd/*.json'
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [job]
        regex: 'filebeat'
        action: keep

  # 7. Elasticsearch (DB Metrics)
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch-exporter:9114']
        labels:
          environment: "central-node"
          nodename: "central-node"

  # 8. Alertmanager (Self monitoring)
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          environment: "central-node"
          nodename: "central-node"

  # 9. Grafana (Self monitoring)
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          environment: "central-node"
          nodename: "central-node"

  # 10. Blackbox Exporter (for external probing - optional)
  - job_name: 'blackbox'
    metrics_path: '/probe'
    params:
      module: [http_2xx]
    static_configs:
      - targets: []   # Add important external URLs here if needed
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115