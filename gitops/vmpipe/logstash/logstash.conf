input {
  # Beats protocol from Filebeat (default port used by your agents)
  beats {
    port => 5045
    tags => ["filebeat"]
  }

  # Optional: Direct TCP JSON input for legacy apps or direct log shipping
  tcp {
    port => 5044
    codec => json
    tags => ["direct-json"]
  }
}
filter {
  # 1. Handle Filebeat Docker metadata & ECS host clash
  if [host] and ![host][name] {
    mutate {
      rename => { "host" => "host_ip" }
    }
  }

  if [container] or [docker] {
    mutate {
      add_field => {
        "node" => "%{[container][id]}"
        "service" => "%{[container][name]}"
      }
    }
  }

  # 2. Normalize common fields
  mutate {
    rename => {
      "[message]" => "raw_message"
      "[log][file][path]" => "log_path"
    }
    strip => ["raw_message"]
  }

  # 3. Extract Application / Environment from labels or fields
  if [docker][labels][com.monetique.environment] {
    mutate {
      add_field => { "environment" => "%{[docker][labels][com.monetique.environment]}" }
    }
  }
  
  if ![environment] {
    mutate {
      add_field => { "environment" => "unknown" }
    }
  }
  grok {
    match => {
      "raw_message" => [
        "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:message}",
        "%{LOGLEVEL:level}: %{GREEDYDATA:message}"
      ]
    }
  }

  # 5. Advanced error classification
  if [message] =~ /(?i)(exception|error|fail|timeout|connection refused)/ {
    mutate {
      add_field => { "severity" => "ERROR" }
    }
  } else if [message] =~ /(?i)(warn|warning)/ {
    mutate {
      add_field => { "severity" => "WARN" }
    }
  } else {
    mutate {
      add_field => { "severity" => "INFO" }
    }
  }

  # 6. Categorization of logs
  if [message] =~ /(?i)(database|sql|jdbc|mysql|postgres)/ {
    mutate { add_field => { "category" => "DATABASE" } }
  } else if [message] =~ /(?i)(http|rest|api|network|timeout|connection)/ {
    mutate { add_field => { "category" => "NETWORK" } }
  } else if [message] =~ /(?i)(external|third.party|oauth|api.gateway)/ {
    mutate { add_field => { "category" => "EXTERNAL_SERVICE" } }
  } else {
    mutate { add_field => { "category" => "APPLICATION" } }
  }

  # 7. Create human-readable normalized summary (for AI and UI)
  mutate {
    add_field => {
      "normalized_summary" => "%{category} - %{severity}: %{message}"
    }
  }

  # 8. Clean up unnecessary fields to save storage
  mutate {
    remove_field => ["beat", "prospector", "input", "offset", "log", "@version"]
  }

  # 9. Add timestamp if missing
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  # Main output: Elasticsearch with daily indices per environment
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "app-logs-%{[environment]}-%{+YYYY.MM.dd}"
    document_type => "_doc"
    user => "${ELASTIC_USER:elastic}"
    password => "${ELASTIC_PASSWORD:changeme}"
    manage_template => false
  }

  # Optional: Debug output to console (useful during development)
  # stdout {
  #   codec => rubydebug
  # }
}