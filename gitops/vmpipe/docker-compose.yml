version: '3.8'

services:
  #  # --- Infrastructure / Database ---
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - /data/monetique/data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monetique-eye-net

  # --- Observability Stack ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    volumes:
      - /data/monetique/gitops/vmpipe/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /data/monetique/gitops/vmpipe/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - /data/monetique/gitops/vmpipe/prometheus/prediction_rules.yml:/etc/prometheus/prediction_rules.yml
      - /data/monetique/gitops/vmpipe/prometheus/file_sd:/etc/prometheus/file_sd
      - /data/monetique/gitops/vmpipe/prometheus/conf.d:/etc/prometheus/conf.d
      - /data/monetique/gitops/vmpipe/prometheus/rules:/etc/prometheus/rules
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /data/monetique/data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    healthcheck:
      test: ["CMD", "wget", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - monetique-eye-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /data:/data:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - --collector.filesystem.ignored-mount-points
      - "^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - monetique-eye-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /data:/data:ro
    ports:
      - "8081:8080"
    networks:
      - monetique-eye-net
      
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.1
    container_name: filebeat
    user: root
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /data/monetique/gitops/vmpipe/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    command: filebeat -e -strict.perms=false
    ports:
      - "5066:5066"
    depends_on:
      - logstash
    networks:
      - monetique-eye-net

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    ports:
      - "9115:9115"
    volumes:
      - /data/monetique/gitops/vmpipe/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    networks:
      - monetique-eye-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    environment:
      SMTP_FROM: ${SMTP_FROM:-monetique.eye.alerts@gmail.com}
      SMTP_USERNAME: ${SMTP_USERNAME:-monetique.eye.alerts@gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-changeme}
      ALERT_RECIPIENT: ${ALERT_RECIPIENT:-ops@monetique.tn}
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp /etc/alertmanager/alertmanager.yml /tmp/alertmanager.yml
        sed -i "s|__SMTP_FROM__|$$SMTP_FROM|g" /tmp/alertmanager.yml
        sed -i "s|__SMTP_USERNAME__|$$SMTP_USERNAME|g" /tmp/alertmanager.yml
        sed -i "s|__SMTP_PASSWORD__|$$SMTP_PASSWORD|g" /tmp/alertmanager.yml
        sed -i "s|__ALERT_RECIPIENT__|$$ALERT_RECIPIENT|g" /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - /data/monetique/gitops/vmpipe/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /data/monetique/gitops/vmpipe/alertmanager/templates:/etc/alertmanager/templates
    networks:
      - monetique-eye-net
  

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - /data/monetique/gitops/vmpipe/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - monetique-eye-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    container_name: elasticsearch
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - /data/monetique/data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - monetique-eye-net

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.9
    container_name: logstash
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
    volumes:
      - /data/monetique/gitops/vmpipe/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
        - "5044:5044"
        - "5045:5045"
        - "5000:5000"
        - "9600:9600"
    environment:
      - ELASTIC_USER=${ELASTIC_USER}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    depends_on:
      - elasticsearch
    networks:
      - monetique-eye-net

  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.5.0
    container_name: elasticsearch-exporter
    restart: always
    command:
      - '--es.uri=http://elasticsearch:9200'
    ports:
      - "9114:9114"
    depends_on:
      - elasticsearch
    networks:
      - monetique-eye-net

# --- Application Stack ---
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: backend:v1
    container_name: backend
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
      com.monetique.environment: "central-node"
      com.monetique.category: "backend"
    volumes:
      - /data/monetique/gitops:/app/gitops
      - /data/monetique/gitops/vmpipe/prometheus/conf.d:/opt/monitoring/prometheus/conf.d
      - /data/monetique/gitops/vmpipe/prometheus/rules:/opt/monitoring/prometheus/rules
    environment:
      SERVER_PORT: ${SERVER_PORT}
      NODE_NAME: "central-node"
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL}
      SPRING_JPA_DATABASE_PLATFORM: ${SPRING_JPA_DATABASE_PLATFORM}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      LOGSTASH_HOST: ${LOGSTASH_HOST}
      LOGSTASH_PORT: ${LOGSTASH_PORT}
      PROMETHEUS_URL: "http://prometheus:9090"
      MONITORING_PROMETHEUS_RELOAD_URL: "http://prometheus:9090/-/reload"
      MONITORING_BLACKBOX_EXPORTER_URL: "blackbox-exporter:9115"
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      MONETIQUE_GITOPS_PATH: "/data/monetique/gitops"
    ports:
      - "8880:8880"
      - "9001:9001"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monetique-eye-net

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${BACKEND_API}
    image: frontend:v1
    container_name: frontend
    restart: always
    labels:
      app: "monetique-eye"
      env: "central-node"
      node: "central-node"
      com.monetique.environment: "central-node"
      com.monetique.category: "frontend"
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - monetique-eye-net
      
  jenkins:
    image: jenkins/jenkins:2.462-lts
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - monetique-eye-net

  registry:
    image: registry:2.8
    container_name: registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - monetique-eye-net

volumes:
  mysql_data:
  prometheus_data:
  elasticsearch_data:
  jenkins_home:
  registry_data:

networks:
  monetique-eye-net:
    driver: bridge

