version: '3.8'

services:
  #  # --- Infrastructure / Database ---
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    labels:
      app: "monetique-eye"
      env: "production"
      node: "vmpipe"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monetique-eye-net

  # --- Observability Stack ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    labels:
      app: "monetique-eye"
      env: "production"
      node: "vmpipe"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - ./prometheus/prediction_rules.yml:/etc/prometheus/prediction_rules.yml
      - ./prometheus/file_sd:/etc/prometheus/file_sd
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    healthcheck:
      test: ["CMD", "wget", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - monetique-eye-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    labels:
      app: "monetique-eye"
      env: "production"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /data:/data:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - --collector.filesystem.ignored-mount-points
      - "^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - monetique-eye-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    labels:
      app: "monetique-eye"
      env: "production"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /data:/data:ro
    ports:
      - "8081:8080"
    networks:
      - monetique-eye-net
  filebeat:
    image: docker.elastic.co/beats/filebeat:7.17.9
    container_name: filebeat
    user: root
    restart: always
    labels:
      app: "monetique-eye"
      env: "production"
      node: "vmpipe"
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    command: filebeat -e -strict.perms=false
    ports:
      - "5066:5066"
    depends_on:
      - logstash
    networks:
      - monetique-eye-net

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    # ... (other blackbox config)
    labels:
      app: "monetique-eye"
      env: "production"
      node: "vmpipe"
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    networks:
      - monetique-eye-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: always
    labels:
      app: "monetique-eye"
      env: "production"
      node: "vmpipe"
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.ym
    networks:
      - monetique-eye-net
  

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    labels:
      app: "monetique-eye"
      env: "production"
      node: "vmpipe"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - monetique-eye-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    container_name: elasticsearch
    restart: always
    labels:
      app: "monetique-eye"
      env: "production"
      node: "vmpipe"
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - monetique-eye-net

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.9
    container_name: logstash
    restart: always
    labels:
      app: "monetique-eye"
      env: "production"
      node: "vmpipe"
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
        - "5044:5044"
        - "5045:5045"
        - "5000:5000"
        - "9600:9600"
    depends_on:
      - elasticsearch
    networks:
      - monetique-eye-net

  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.5.0
    container_name: elasticsearch-exporter
    restart: always
    command:
      - '--es.uri=http://elasticsearch:9200'
    ports:
      - "9114:9114"
    depends_on:
      - elasticsearch
    networks:
      - monetique-eye-net

# --- Application Stack ---
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: backend:v1
    container_name: backend
    restart: always
    labels:
      app: "monetique-eye"
      env: "production"
      node: "vmpipe"
    volumes:
      - ../:/app/gitops
    environment:
      SERVER_PORT: ${SERVER_PORT}
      NODE_NAME: "vmpipe"
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL}
      SPRING_JPA_DATABASE_PLATFORM: ${SPRING_JPA_DATABASE_PLATFORM}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      LOGSTASH_HOST: ${LOGSTASH_HOST}
      LOGSTASH_PORT: ${LOGSTASH_PORT}
      PROMETHEUS_URL: ${PROMETHEUS_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      MONETIQUE_GITOPS_PATH: "/app/gitops"
    ports:
      - "8880:8880"
      - "9001:9001"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monetique-eye-net

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${BACKEND_API}
    image: frontend:v1
    container_name: frontend
    restart: always
    labels:
      app: "monetique-eye"
      env: "production"
      node: "vmpipe"
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - monetique-eye-net
      
volumes:
  mysql_data:
  prometheus_data:
  elasticsearch_data:

networks:
  monetique-eye-net:
    driver: bridge

